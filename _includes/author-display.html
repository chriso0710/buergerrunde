{% assign author = site.authors[include.author] %}{% if author %}{% if author.avatar %}<span class="meta-footer-thumb"><img class="author-thumb" src="{{site.baseurl}}/{{ author.avatar }}" alt="{{ author.display_name }}"></span>{% endif %}<span class="author-meta"><span class="post-name">{{ author.display_name }}</span>{% if include.show_description %}<span class="author-description">{{ author.description }}</span>{% endif %}</span>{% endif %}
